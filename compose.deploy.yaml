services:
  app:
    image: "ghcr.io/reannu123/business-frontpage-lead-capture:${IMAGE_TAG:-main}"
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./data/dev.db
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://frontpage.reannu.dev}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-false}"
    ports:
      - "${APP_PORT:-3021}:3000"
    volumes:
      - /docker/appdata/business-frontpage-lead-capture/sqlite:/app/prisma/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
