services:
  app:
    build:
      context: .
      target: development
    image: business-frontpage-lead-capture:dev
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./data/dev.db
      NEXT_PUBLIC_SITE_URL: http://localhost:${APP_PORT:-3000}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - sqlite_data:/app/prisma/data
    command: sh -c "npm run db:push && npm run dev"

volumes:
  node_modules:
  next_cache:
  sqlite_data:
